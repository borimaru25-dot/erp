<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - ERP</title>
  <link rel="stylesheet" href="/public/css/base.css">
  <link rel="stylesheet" href="/public/css/layout.css">
  <link rel="stylesheet" href="/public/css/components.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <h1 class="login-card__title">ERP 로그인</h1>
    <form id="login-form">
      <div class="login-card__field">
        <label for="email">이메일</label>
        <input type="email" class="form-input" id="email"
          placeholder="이메일을 입력하세요" required>
      </div>
      <div class="login-card__field">
        <label for="password">비밀번호</label>
        <input type="password" class="form-input" id="password"
          placeholder="비밀번호를 입력하세요" required>
      </div>
      <button type="submit" class="btn btn--primary login-card__submit">
        로그인
      </button>
      <p class="login-card__error hidden" id="login-error"></p>
    </form>
  </div>
</div>

<div class="toast-container"></div>

<script type="module">
  import { login } from '/public/js/core/auth.js';
  import { showToast } from '/public/js/core/ui.js';

  document.getElementById('login-form')
    .addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await login(email, password);
        window.location.href = '/pages/modules/document-manager/index.html';
      } catch (err) {
        const errorEl = document.getElementById('login-error');
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
        showToast('로그인에 실패했습니다.', 'error');
      }
    });
</script>

</body>
</html>
